<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<title>Nexus Browser</title>

<link rel="stylesheet" href="style.css">
<link rel="icon" href="assets/logo.png">

</head>

<body>

<!-- LOGO -->
<img src="assets/logo.png" id="logo">

<!-- BARRA SUPERIOR -->
<div class="topbar">

<!-- CONTROLES -->
<div class="nav-controls">

<button id="btnVoltar" title="Voltar">
<img src="assets/icons/back.svg">
</button>

<button id="btnAvancar" title="Avançar">
<img src="assets/icons/forward.svg">
</button>

<button id="btnRecarregar" title="Recarregar">
<img src="assets/icons/reload.svg">
</button>

</div>

<!-- BARRA URL -->
<input
id="url"
type="text"
placeholder="Pesquisar ou digitar URL"
autocomplete="off"
/>

<!-- BOTÕES -->
<div class="nav-buttons">

<button id="btnIr" title="Ir">
<img src="assets/icons/search.svg">
</button>

<button id="btnIA" title="Assistente IA">
<img src="assets/icons/ai.svg">
</button>

<button id="btnEstudo" title="Modo Estudo">
<img src="assets/icons/book.svg">
</button>

<button id="btnNovaAba" title="Nova Aba">
<img src="assets/icons/plus.svg">
</button>

</div>

<!-- MENU -->
<div class="menu-area">

<button id="btnMenu" title="Menu">
<img src="assets/icons/menu.svg">
</button>

</div>

</div>


<!-- ABAS -->
<div id="tabs"></div>


<!-- NAVEGADOR -->
<div id="browser-container"></div>


<!-- MENU -->
<div id="menuDropdown" class="menu-dropdown">

<div class="menu-item" id="menuNovaGuia">Nova guia</div>
<div class="menu-item" id="menuNovaJanela">Nova janela</div>
<div class="menu-item" id="menuHistorico">Histórico</div>
<div class="menu-item" id="menuDownloads">Downloads</div>
<div class="menu-item" id="menuFavoritos">Favoritos</div>
<div class="menu-item" id="menuConfiguracoes">Configurações</div>
<div class="menu-item" id="menuAjuda">Ajuda</div>

</div>


<!-- SCRIPTS -->
<script src="tabs.js"></script>
<script src="renderer.js"></script>
<script src="ai.js"></script>
<script src="security.js"></script>

<script>

window.addEventListener("DOMContentLoaded", () => {

const menu = document.getElementById("menuDropdown")
const btnMenu = document.getElementById("btnMenu")

// primeira aba
novaAba("https://www.google.com")

// abrir menu
btnMenu.addEventListener("click",(e)=>{

e.stopPropagation()

menu.style.display =
menu.style.display === "block"
? "none"
: "block"

})

// fechar menu
document.addEventListener("click",(e)=>{

if(!btnMenu.contains(e.target) && !menu.contains(e.target)){
menu.style.display="none"
}

})

// ações do menu
document.getElementById("menuNovaGuia").onclick = ()=> novaAba("https://www.google.com")

document.getElementById("menuNovaJanela").onclick = ()=> alert("Nova janela em desenvolvimento")

document.getElementById("menuHistorico").onclick = ()=> alert("Histórico em desenvolvimento")

document.getElementById("menuDownloads").onclick = ()=> alert("Downloads em desenvolvimento")

document.getElementById("menuFavoritos").onclick = ()=> alert("Favoritos em desenvolvimento")

document.getElementById("menuConfiguracoes").onclick = ()=> alert("Configurações em desenvolvimento")

document.getElementById("menuAjuda").onclick = ()=> alert("Nexus Browser")

})

</script>

</body>
</html>
