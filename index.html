<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Nexus Browser</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- ===================== -->
<!-- BARRA SUPERIOR -->
<!-- ===================== -->

<div class="topbar">

<div class="nav-left">

<input
id="url"
type="text"
placeholder="Pesquisar ou digitar URL"
autocomplete="off"
/>

</div>

<div class="nav-buttons">

<button id="btnIr" class="btn-primary">
🌐 Ir
</button>

<button id="btnIA" class="btn-secondary">
🤖 IA
</button>

<button id="btnEstudo" class="btn-secondary">
📖 Modo Estudo
</button>

<button id="btnNovaAba" class="btn-newtab">
＋ Nova Aba
</button>

</div>

</div>

<!-- ===================== -->
<!-- ABAS -->
<!-- ===================== -->

<div id="tabs"></div>

<!-- ===================== -->
<!-- ÁREA DO NAVEGADOR -->
<!-- ===================== -->

<div id="browser-container"></div>

<!-- ===================== -->
<!-- SCRIPTS -->
<!-- ===================== -->

<script src="tabs.js"></script>
<script src="renderer.js"></script>
<script src="ai.js"></script>
<script src="security.js"></script>

<script>

window.addEventListener("DOMContentLoaded", () => {

const urlBar = document.getElementById("url")
const btnIr = document.getElementById("btnIr")
const btnNovaAba = document.getElementById("btnNovaAba")
const btnIA = document.getElementById("btnIA")
const btnEstudo = document.getElementById("btnEstudo")

// primeira aba
novaAba("https://www.google.com")

// botão IR
btnIr.addEventListener("click", navegar)

// botão NOVA ABA
btnNovaAba.addEventListener("click", () => {
novaAba("https://www.google.com")
})

// botão IA
btnIA.addEventListener("click", () => {
if(typeof resumir === "function"){
resumir()
}
})

// botão modo estudo
btnEstudo.addEventListener("click", () => {
if(typeof modoEstudo === "function"){
modoEstudo()
}
})

// ENTER na barra
urlBar.addEventListener("keydown", (e) => {

if(e.key === "Enter"){
navegar()
}

})

})

</script>

</body>
</html>
