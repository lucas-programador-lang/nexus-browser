<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Nexus Browser</title>

<link rel="stylesheet" href="style.css">
<link rel="icon" href="assets/logo.png">

</head>

<body>

<!-- ===================== -->
<!-- LOGO -->
<!-- ===================== -->

<img src="assets/logo.png" id="logo">

<!-- ===================== -->
<!-- BARRA SUPERIOR -->
<!-- ===================== -->

<div class="topbar">

<!-- CONTROLES DE NAVEGAÇÃO -->

<div class="nav-controls">

<button id="btnVoltar" title="Voltar">
←
</button>

<button id="btnAvancar" title="Avançar">
→
</button>

<button id="btnRecarregar" title="Recarregar">
⟳
</button>

</div>


<!-- BARRA DE URL -->

<input
id="url"
type="text"
placeholder="Pesquisar ou digitar URL"
autocomplete="off"
/>


<!-- BOTÕES PRINCIPAIS -->

<div class="nav-buttons">

<button id="btnIr" title="Ir">
🌐
</button>

<button id="btnIA" title="Assistente IA">
🤖
</button>

<button id="btnEstudo" title="Modo Estudo">
📖
</button>

<button id="btnNovaAba" title="Nova Aba">
＋
</button>

</div>


<!-- MENU -->

<div class="menu-area">

<button id="btnMenu" title="Menu">
☰
</button>

</div>

</div>


<!-- ===================== -->
<!-- ABAS -->
<!-- ===================== -->

<div id="tabs"></div>


<!-- ===================== -->
<!-- NAVEGADOR -->
<!-- ===================== -->

<div id="browser-container"></div>


<!-- ===================== -->
<!-- MENU DROPDOWN -->
<!-- ===================== -->

<div id="menuDropdown" class="menu-dropdown">

<div class="menu-item">Nova guia</div>
<div class="menu-item">Nova janela</div>
<div class="menu-item">Histórico</div>
<div class="menu-item">Downloads</div>
<div class="menu-item">Favoritos</div>
<div class="menu-item">Configurações</div>
<div class="menu-item">Ajuda</div>

</div>


<!-- ===================== -->
<!-- SCRIPTS -->
<!-- ===================== -->

<script src="tabs.js"></script>
<script src="renderer.js"></script>
<script src="ai.js"></script>
<script src="security.js"></script>

<script>

window.addEventListener("DOMContentLoaded", () => {

const btnMenu = document.getElementById("btnMenu")
const menu = document.getElementById("menuDropdown")

// primeira aba
novaAba("https://www.google.com")

// abrir menu
btnMenu.addEventListener("click", () => {

menu.style.display =
menu.style.display === "block"
? "none"
: "block"

})

// fechar menu ao clicar fora
document.addEventListener("click",(e)=>{

if(!btnMenu.contains(e.target) && !menu.contains(e.target)){
menu.style.display="none"
}

})

})

</script>

</body>
</html>
