<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Nexus Browser</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- Barra superior -->
<div class="topbar">

<input 
id="url"
type="text"
placeholder="Pesquisar ou digitar URL"
autocomplete="off"
/>

<button id="btnIr">Ir</button>

<button id="btnIA">IA</button>

<button id="btnEstudo">Modo Estudo</button>

<button id="btnNovaAba">+ Nova Aba</button>

</div>

<!-- Área das abas -->
<div id="tabs"></div>

<!-- Área onde ficam os navegadores -->
<div id="browser-container"></div>

<script src="tabs.js"></script>
<script src="renderer.js"></script>
<script src="ai.js"></script>
<script src="security.js"></script>

<script>

// iniciar navegador
window.addEventListener("DOMContentLoaded", () => {

novaAba("https://www.google.com")

// botão navegar
document.getElementById("btnIr").addEventListener("click", navegar)

// botão nova aba
document.getElementById("btnNovaAba").addEventListener("click", () => {
novaAba("https://www.google.com")
})

// botão IA
document.getElementById("btnIA").addEventListener("click", resumir)

// botão modo estudo
document.getElementById("btnEstudo").addEventListener("click", modoEstudo)

// ENTER na barra de endereço
document.getElementById("url").addEventListener("keydown", (e) => {

if(e.key === "Enter"){
navegar()
}

})

})

</script>

</body>

</html>
